<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manufacturing Performance Monitoring System</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div id="login-screen" class="login-screen" style="display:none"></div>

<button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="Open navigation" aria-controls="sidebar" aria-expanded="false" style="display:none">
  <span></span>
  <span></span>
  <span></span>
</button>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<div class="app" id="app-shell" style="display:none">
  <div class="profile-float" id="profile-float">
    <button class="profile-btn" id="profile-btn" aria-label="User menu"></button>
    <div class="profile-dropdown" id="profile-dropdown">
      <div class="user-name" id="profile-name"></div>
      <div class="user-role pill" id="profile-role"></div>
      <button class="logout-btn" id="logout-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sign out
      </button>
    </div>
  </div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <!-- Integrated Pioneer Logo here -->
      <div class="sidebar-logo">
        <img src="pioneer-logo.svg" alt="Pioneer Adhesives, Inc. Trademark" class="logo-image">
      </div>
      <div class="sidebar-title">Performance Monitor</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-label">Dashboards</div>
        <button class="nav-item active" data-page="executive" onclick="navigateTo(this.dataset.page)">Executive Summary</button>
        <button class="nav-item" data-page="cost" onclick="navigateTo(this.dataset.page)">Cost Dashboard</button>
        <button class="nav-item" data-page="manhours" onclick="navigateTo(this.dataset.page)">Runrate & Manhours</button>
        <button class="nav-item" data-page="loss" onclick="navigateTo(this.dataset.page)">Loss Analysis</button>
        <button class="nav-item" data-page="budget" onclick="navigateTo(this.dataset.page)">OB vs Actual</button>
      </div>
      <div class="nav-section" id="nav-data-entry">
        <div class="nav-label">Data Entry</div>
        <button class="nav-item" data-page="import" onclick="navigateTo(this.dataset.page)">Import Excel</button>
        <button class="nav-item" data-page="entry-utilities" onclick="navigateTo(this.dataset.page)">Actual Cost & Volume</button>
        <button class="nav-item" data-page="entry-budget" onclick="navigateTo(this.dataset.page)">OB / Target</button>
        <button class="nav-item" data-page="entry-capacity" onclick="navigateTo(this.dataset.page)">Runrate Efficiency</button>
        <button class="nav-item" data-page="entry-manhours" onclick="navigateTo(this.dataset.page)">Manhours</button>
      </div>
      <div class="nav-section" id="nav-admin" style="display:none">
        <div class="nav-label">Administration</div>
        <button class="nav-item" data-page="admin" onclick="navigateTo(this.dataset.page)">Admin Panel</button>
      </div>
    </nav>
    <div class="month-filter">
      <label>Viewing Period</label>
      <!-- Hidden select keeps getGlobalMonth() working without changing any other JS -->
      <select id="globalMonth" style="display:none" onchange="onGlobalMonthChange()">
        <option value="">All Months</option>
      </select>
      <div id="period-picker-root"></div>
    </div>
  </aside>

  <main class="main" id="main">
    <div id="page-executive"></div>
    <div id="page-cost" style="display:none"></div>
    <div id="page-production" style="display:none"></div>
    <div id="page-manhours" style="display:none"></div>
    <div id="page-loss" style="display:none"></div>
    <div id="page-budget" style="display:none"></div>
    <div id="page-import" style="display:none"></div>
    <div id="page-entry-utilities" style="display:none"></div>
    <div id="page-entry-production" style="display:none"></div>
    <div id="page-entry-capacity" style="display:none"></div>
    <div id="page-entry-manhours" style="display:none"></div>
    <div id="page-entry-budget" style="display:none"></div>
    <div id="page-admin" style="display:none"></div>
  </main>
</div>

<div id="toast" class="toast"></div>

<script type="module" src="./js/app.js?v=auth-login-20260616"></script>
</body>
</html>
